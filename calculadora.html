    <title>Calculadora de Fatorial</title>
    <style>
        body{
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background-color: #f0f0f0;
        }
        .box{
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            margin: auto;
            box-shadow: 0px 0px 10px gray;
        }
        input, button {
            padding: 10px;
            margin: 10px;
            width: 80%;
        }
       .enter a{
          color: whitesmoke;
          background-image: linear-gradient(20deg,red, black);
         text-decoration: none;
         font-family: 'Times New Roman', Times, serif;
         border: 1px solid red;
         border-radius: 30px;
    }

    </style>
</head>
<body>

    <div class="box">
        <h2>Fatorial</h2>

        <input type="number" id="numero" placeholder="Digite um número">
        <br>

        <button onclick="calcular()">Calcular</button>

        <h3 id="resultado"></h3>
    </div>

    <script>
        function calcular() {
            let n = document.getElementById("numero").value;
            n = parseInt(n);

            if (isNaN(n) || n < 0) {
                document.getElementById("resultado").innerText = "Digite um número válido!";
                return;
            }

            let fatorial = 1;

            for (let i = 1; i <= n; i++) {
                fatorial *= i;
            }

            document.getElementById("resultado").innerText = 
                "Resultado: " + fatorial;
        }
    </script>

</body>
