  <div class="amor">
     <form action="https://google.com" method="get">

  <form action="" name="calculadora" method="get" accept-charset="utf-8">

    <input type="button" name="text" class="nono" value="❌" onclick="location.reload()">
  <br>

    function digite(n1){
      calculadora.text1.value=calculadora.text1.value + n1;
